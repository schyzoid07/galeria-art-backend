spring.application.name=Galeria

# ==============================================================
# 1. CONFIGURACI”N DEL SERVIDOR
# ==============================================================
# Puerto donde correr· la API de Spring Boot
server.port=8080

# ==============================================================
# 2. CONEXI”N A LA BASE DE DATOS POSTGRESQL (DOCKER)
# ==============================================================
spring.datasource.url=jdbc:postgresql://localhost:5332/museo_db
spring.datasource.username=Miguel
# contraseÒa del  contenedor de Docker
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# ==============================================================
# 3. CONFIGURACI”N DE JPA / HIBERNATE
# ==============================================================
# 'none' le dice a Spring Boot que NO cree las tablas
# autom·ticamente, sino con un  script SQL propio.
spring.jpa.hibernate.ddl-auto=update

# Muestra en la consola de Spring las consultas SQL que se ejecutan
spring.jpa.show-sql=true

# Le da un formato bonito y legible al SQL en la consola
spring.jpa.properties.hibernate.format_sql=true

# Le indica a Hibernate quÈ dialecto de SQL usar (optimizado para Postgres)

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Para evitar problemas con la carga de objetos pesados (Lazy Loading)
spring.jackson.serialization.fail-on-empty-beans=false